<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jako — Tommin kokoelma</title>
    <meta name="theme-color" content="#1f5a3f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Jako" />
    <meta name="description" content="JAKO on kokoelma perinteisiä korttipelejä. Pelaa Kultakala, Läpsy, Ristiseiska, Seiska, Kasino, Koputus, Maija, Paskahousu ja Moska suoraan selaimessasi." />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #1f5a3f; font-family: Georgia, serif; }
      /* Näkyvä kultainen fokusrengas näppäimistökäyttäjille (ei hiirelle) */
      :focus-visible { outline: 2px solid #c9a84c; outline-offset: 2px; }
      /* Kunnioita käyttäjän liikkeenvähennysasetusta: sammuta animaatiot */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
      }
    </script>
  </body>
</html>
